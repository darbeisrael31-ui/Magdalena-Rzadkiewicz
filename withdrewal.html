<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opname - ACC INVESTMENT</title>
  <style>
    body {
      background-color: #000814;
      color: #d4af37;
      font-family: 'Poppins', sans-serif;
      text-align: center;
      padding: 80px 20px;
    }
    h1 {
      color: #00ff88;
      font-size: 36px;
    }
    .info {
      font-size: 24px;
      margin: 20px 0;
    }
    .fee {
      font-size: 20px;
      color: #ff5555;
    }
    button {
      background-color: #00ff88;
      color: #000;
      border: none;
      padding: 15px 40px;
      font-size: 18px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 30px;
    }
    button:hover {
      background-color: #d4af37;
    }
  </style>
</head>
<body>
  <h1>Opname aanvragen</h1>
  <div class="info">Geachte Magdalena Rzadkiewicz,</div>
  <div class="info">Beschikbare winst: <strong>8.500 €</strong></div>
  <div class="info">Bank: <strong>Rabobank</strong></div>
  <div class="fee">Opnamekosten: 210 €</div>
  <div class="info" style="font-size: 26px; margin-top: 30px;">
    Netto bedrag na kosten: <strong>8.290 €</strong>
  </div>
  <button onclick="alert('Opname aangevraagd! (Dit is een demo.)')">Bevestig opname</button>
  <p style="margin-top: 40px; font-size: 16px;">Wordt verwerkt naar uw Rabobank-rekening. Verwerking: 1-3 werkdagen.</p>
</body>
</html>
